name: Run tests
on:
  workflow_dispatch:
  pull_request:
jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven
          
      - name: Run Tests in MyTodoList Package
        run: |
          cd MtdrSpring\backend
          /mvnw clean test -Dtest=com.springboot.MyTodoList.*
