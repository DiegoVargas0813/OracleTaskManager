version: 0.1
component: build
timeoutInSeconds: 600
shell: bash

env:
  variables:
    JAVA_HOME: /usr/lib64/graalvm/graalvm22-ee-java17
    DOCKER_REGISTRY: mx-queretaro-1.ocir.io/axvz6pcfltnr/hellodevops/deploy1
    OCIR_USERNAME: axvz6pcfltnr/a01635782@tec.mx
    OCIR_AUTH_TOKEN: mgLChj]GCkxLACp]rt5P

steps:
  - type: Command
    name: "Install GraalVM Enterprise 22.x Native Image for Java17"
    command: yum -y install graalvm22-ee-17-native-image

  - type: Command
    name: "Set PATH Variable"
    command: export PATH=$JAVA_HOME/bin:$PATH

  - type: Command
    name: "Java Build"
    command: |
      cd MtdrSpring
      cd backend
      ./mvnw clean package

  - type: Command
    name: "Docker Login"
    command: |
      echo "$OCIR_AUTH_TOKEN" | docker login -u "$OCIR_USERNAME" --password-stdin mx-queretaro-1.ocir.io

  - type: Command
    name: "Build and Push Docker Image"
    command: |
      cd MtdrSpring
      source env.sh
      (cd backend; source build.sh)



