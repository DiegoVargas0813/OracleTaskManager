version: 0.1
component: build
timeoutInSeconds: 1200
shell: bash

env:
  variables:
    JAVA_HOME: /usr/lib64/graalvm/graalvm22-ee-java17
    DOCKER_REGISTRY: mx-queretaro-1.ocir.io/axvz6pcfltnr/hellodevops/deploy1
    OCIR_USERNAME: axvz6pcfltnr/a01635782@tec.mx
    OCIR_AUTH_TOKEN: mgLChj]GCkxLACp]rt5P

steps:
  - type: Command
    name: "Check Directory Structure and Run Build"
    command: |
      echo "Current directory: $(pwd)"
      echo "Directory contents:"
      ls -l
      echo "Contents of MtdrSpring:"
      ls -l MtdrSpring
      echo "Contents of MtdrSpring/backend:"
      ls -l MtdrSpring/backend

      echo "$OCIR_AUTH_TOKEN" | docker login -u "$OCIR_USERNAME" --password-stdin mx-queretaro-1.ocir.io

      echo "📦 Mounting workspace: $(pwd)"
      docker run --rm \
        -v $(pwd):/workspace \
        -v /var/run/docker.sock:/var/run/docker.sock \
        -w /workspace/MtdrSpring/backend \
        -e DOCKER_REGISTRY="$DOCKER_REGISTRY" \
        -e OCIR_USERNAME="$OCIR_USERNAME" \
        -e OCIR_AUTH_TOKEN="$OCIR_AUTH_TOKEN" \
        oraclelinux:8 \
        bash -c "
          set -e

          echo '🧰 Installing build dependencies...'
          yum -y install oracle-epel-release-el8 && \
          yum -y install nodejs npm maven java-17-openjdk-devel docker && \
          echo '✅ Dependencies installed.'

          echo '📁 Checking contents of /workspace:'
          ls -l /workspace
          echo '📁 Checking contents of /workspace/MtdrSpring:'
          ls -l /workspace/MtdrSpring
          echo '📁 Checking contents of /workspace/MtdrSpring/backend:'
          ls -l /workspace/MtdrSpring/backend

          echo \"🔎 Current working directory: \$(pwd)\"

          echo '📜 Sourcing environment variables...'
          if [ ! -f ../env.sh ]; then ls -l ..; echo '❌ env.sh not found'; exit 1; fi
          chmod +x ../env.sh
          . ../env.sh
          echo \"✅ MTDRWORKSHOP_LOCATION: \$MTDRWORKSHOP_LOCATION\"

          echo '🚀 Running build script...'
          ./build.sh
        "