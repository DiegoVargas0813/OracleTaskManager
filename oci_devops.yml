version: 0.1
component: build
timeoutInSeconds: 1200
shell: bash

env:
  variables:
    # Ya no necesitas JAVA_HOME aquí, Maven usa su propio JDK
    DOCKER_REGISTRY: mx-queretaro-1.ocir.io/axvz6pcfltnr/hellodevops/deploy1
    OCIR_USERNAME: axvz6pcfltnr/a01635782@tec.mx
    OCIR_AUTH_TOKEN: mgLChj]GCkxLACp]rt5P

steps:
  # 1) Carga tus variables de entorno (si las necesitas realmente)
  - type: Command
    name: "Source Env"
    image: oraclelinux:8
    command: |
      set -e
      chmod +x MtdrSpring/env.sh
      . MtdrSpring/env.sh
      echo "✅ MTDRWORKSHOP_LOCATION=$MTDRWORKSHOP_LOCATION"

  # 2) Empaqueta el JAR sin tests con Maven
  - type: Command
    name: "Build Java JAR (skip tests)"
    image: apache/maven:3.8.8-jdk-17
    workingDirectory: MtdrSpring/backend
    command: |
      mvn clean package -DskipTests
      echo "🔍 Artifacts in target/:"
      ls -l target

  # 3) Construye y sube la imagen Docker usando MtdrSpring/backend como contexto
  - type: Command
    name: "Build & Push Docker Image"
    image: docker:24
    command: |
      echo "$OCIR_AUTH_TOKEN" | docker login -u "$OCIR_USERNAME" --password-stdin $DOCKER_REGISTRY

      # Diagnóstico rápido:
      ls -l MtdrSpring/backend/target

      docker build \
        -f MtdrSpring/backend/Dockerfile \
        -t $DOCKER_REGISTRY/todolistapp-springboot:latest \
        MtdrSpring/backend

      docker push $DOCKER_REGISTRY/todolistapp-springboot:latest
