version: 0.1
component: build
timeoutInSeconds: 1200
shell: bash

env:
  variables:
    JAVA_HOME: /usr/lib64/graalvm/graalvm22-ee-java17
    DOCKER_REGISTRY: mx-queretaro-1.ocir.io/axvz6pcfltnr/hellodevops/deploy1
    OCIR_USERNAME: axvz6pcfltnr/a01635782@tec.mx
    OCIR_AUTH_TOKEN: mgLChj]GCkxLACp]rt5P

steps:
  - type: Command
    name: "Check Directory Structure and Run Build"
    command: |
      echo "🔍 Host: Current directory: $(pwd)"
      echo "🔍 Host: Directory contents:"
      ls -l
      echo "🔍 Host: Contents of MtdrSpring:"
      ls -l MtdrSpring
      echo "🔍 Host: Contents of MtdrSpring/backend:"
      ls -l MtdrSpring/backend
      echo "🔍 Host: Contents of MtdrSpring/utils:"
      ls -l MtdrSpring/utils || echo "No utils dir"
      echo "🔍 Host: env.sh exists?"
      [ -f MtdrSpring/env.sh ] && echo "env.sh found" || echo "env.sh NOT found"
      echo "🔍 Host: build.sh exists?"
      [ -f MtdrSpring/backend/build.sh ] && echo "build.sh found" || echo "build.sh NOT found"

      echo "$OCIR_AUTH_TOKEN" | docker login -u "$OCIR_USERNAME" --password-stdin mx-queretaro-1.ocir.io

      # Ensure we always mount the repo root, not a subdirectory
      REPO_ROOT=$(pwd)
      echo "📦 Mounting workspace: $REPO_ROOT"
      docker run --rm \
        -v "$REPO_ROOT":/workspace \
        -v /var/run/docker.sock:/var/run/docker.sock \
        -w /workspace/MtdrSpring/backend \
        -e DOCKER_REGISTRY="$DOCKER_REGISTRY" \
        -e OCIR_USERNAME="$OCIR_USERNAME" \
        -e OCIR_AUTH_TOKEN="$OCIR_AUTH_TOKEN" \
        oraclelinux:8 \
        bash -c "
          set -e

          echo '🔍 Container: Checking /workspace'
          ls -l /workspace
          echo '🔍 Container: Checking /workspace/MtdrSpring'
          ls -l /workspace/MtdrSpring
          echo '🔍 Container: Checking /workspace/MtdrSpring/backend'
          ls -l /workspace/MtdrSpring/backend
          echo '🔍 Container: Checking /workspace/MtdrSpring/utils'
          ls -l /workspace/MtdrSpring/utils || echo 'No utils dir'
          echo '🔍 Container: env.sh exists?'
          [ -f /workspace/MtdrSpring/env.sh ] && echo 'env.sh found' || echo 'env.sh NOT found'
          echo '🔍 Container: build.sh exists?'
          [ -f /workspace/MtdrSpring/backend/build.sh ] && echo 'build.sh found' || echo 'build.sh NOT found'

          echo \"🔎 Current working directory: \$(pwd)\"

          echo '🧰 Installing build dependencies...'
          yum -y install oracle-epel-release-el8 && \
          yum -y install nodejs npm maven java-17-openjdk-devel docker && \
          echo '✅ Dependencies installed.'

          echo '📜 Sourcing environment variables...'
          if [ ! -f ../env.sh ]; then ls -l ..; echo '❌ env.sh not found'; exit 1; fi
          chmod +x ../env.sh
          . ../env.sh
          echo \"✅ MTDRWORKSHOP_LOCATION: \$MTDRWORKSHOP_LOCATION\"

          echo '🚀 Running build script...'
          ./build.sh
        "