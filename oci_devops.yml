version: 0.1
component: build
timeoutInSeconds: 1200
shell: bash

env:
  variables:
    JAVA_HOME: /usr/lib64/graalvm/graalvm22-ee-java17
    DOCKER_REGISTRY: mx-queretaro-1.ocir.io/axvz6pcfltnr/hellodevops/deploy1
    OCIR_USERNAME: axvz6pcfltnr/a01635782@tec.mx
    OCIR_AUTH_TOKEN: mgLChj]GCkxLACp]rt5P

steps:
  - type: Command
    name: "Check Directory Structure and Run Build"
    image: oraclelinux:8
    command: |
      set -e

      echo "🔍 Runner: Current directory: $(pwd)"
      echo "🔍 Runner: Directory contents:"
      ls -l

      echo "🔍 Runner: Contents of MtdrSpring:"
      ls -l MtdrSpring

      echo "🔍 Runner: Contents of MtdrSpring/backend:"
      ls -l MtdrSpring/backend

      echo "🔍 Runner: Contents of MtdrSpring/utils:"
      ls -l MtdrSpring/utils || echo "No utils dir"

      echo "🔍 Runner: env.sh exists?"
      [ -f MtdrSpring/env.sh ] && echo "env.sh found" || echo "env.sh NOT found"

      echo "🔍 Runner: build.sh exists?"
      [ -f MtdrSpring/backend/build.sh ] && echo "build.sh found" || echo "build.sh NOT found"

      echo "$OCIR_AUTH_TOKEN" | docker login -u "$OCIR_USERNAME" --password-stdin mx-queretaro-1.ocir.io

      echo '🧰 Installing build dependencies...'
      yum -y install nodejs npm maven java-17-openjdk-devel docker
      echo '✅ Dependencies installed.'

      echo '📜 Sourcing environment variables...'
      chmod +x MtdrSpring/env.sh || { echo '❌ env.sh not executable'; exit 1; }
      . MtdrSpring/env.sh

      echo "✅ MTDRWORKSHOP_LOCATION: $MTDRWORKSHOP_LOCATION"

      echo '🚀 Running build script...'
      chmod +x MtdrSpring/backend/build.sh
      MtdrSpring/backend/build.sh