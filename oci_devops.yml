version: 0.1
component: build
timeoutInSeconds: 1200
shell: bash

env:
  variables:
    DOCKER_REGISTRY: mx-queretaro-1.ocir.io/axvz6pcfltnr/hellodevops/deploy1
    OCIR_USERNAME: axvz6pcfltnr/a01635782@tec.mx
    OCIR_AUTH_TOKEN: mgLChj]GCkxLACp]rt5P

steps:
  - type: Command
    name: "Check Directory Structure and Run Build"
    image: oraclelinux:9
    command: |
      set -e

      echo "🔍 Runner: Current directory: $(pwd)"
      echo "🔍 Runner: Directory contents:"
      ls -l

      echo "$OCIR_AUTH_TOKEN" | docker login -u "$OCIR_USERNAME" --password-stdin mx-queretaro-1.ocir.io

      echo '🧰 Installing build dependencies...'
      yum -y install nodejs npm java-17-openjdk-devel docker curl tar

      # Install Maven 3.8.8
      MAVEN_VERSION=3.8.8
      curl -fsSL https://downloads.apache.org/maven/maven-3/${MAVEN_VERSION}/binaries/apache-maven-${MAVEN_VERSION}-bin.tar.gz -o /tmp/apache-maven.tar.gz
      tar -xzf /tmp/apache-maven.tar.gz -C /opt
      export MAVEN_HOME=/opt/apache-maven-${MAVEN_VERSION}
      export PATH=$MAVEN_HOME/bin:$PATH
      echo "export MAVEN_HOME=/opt/apache-maven-${MAVEN_VERSION}" >> ~/.bashrc
      echo "export PATH=\$MAVEN_HOME/bin:\$PATH" >> ~/.bashrc

      mvn -version
      java -version
      node -v
      npm -v
      docker --version

      echo '📜 Sourcing environment variables...'
      chmod +x MtdrSpring/env.sh || { echo '❌ env.sh not executable'; exit 1; }
      . MtdrSpring/env.sh

      echo "✅ MTDRWORKSHOP_LOCATION: $MTDRWORKSHOP_LOCATION"

      echo '🚀 Running build script...'
      cd "$MTDRWORKSHOP_LOCATION"
      source env.sh
      cd backend
      bash build.sh

      echo "🔍 After build.sh: Listing backend/target directory"
      ls -l "$MTDRWORKSHOP_LOCATION/backend/target" || echo "No target dir"