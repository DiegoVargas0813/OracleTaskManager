version: 0.1
component: build
timeoutInSeconds: 1200
shell: bash

env:
  variables:
    JAVA_HOME: /usr/lib64/graalvm/graalvm22-ee-java17
    DOCKER_REGISTRY: mx-queretaro-1.ocir.io/axvz6pcfltnr/hellodevops/deploy1
    OCIR_USERNAME: axvz6pcfltnr/a01635782@tec.mx
    OCIR_AUTH_TOKEN: mgLChj]GCkxLACp]rt5P

steps:
  - type: Command
    name: "Docker Login"
    command: |
      echo "$OCIR_AUTH_TOKEN" | docker login -u "$OCIR_USERNAME" --password-stdin mx-queretaro-1.ocir.io

  - type: Command
    name: "Build with Modern Oracle Linux in Docker"
    command: |
      docker run --rm \
        -v $PWD/MtdrSpring:/workspace \
        -w /workspace/backend \
        oraclelinux:8 \
        bash -c "
          yum -y install oracle-epel-release-el8 && \
          yum -y install nodejs npm maven java-17-openjdk-devel && \
          mvn clean package spring-boot:repackage -DskipTests
        "

  - type: Command
    name: "Check JAR Exists"
    command: |
      if [ ! -f MtdrSpring/backend/target/MyTodoList-0.0.1-SNAPSHOT.jar ]; then
        echo 'ERROR: JAR file not found!'
        ls -l MtdrSpring/backend/target
        exit 1
      fi

  - type: Command
    name: "Build and Push Docker Image"
    command: |
      cd MtdrSpring
      source env.sh
      (cd backend; source build.sh)