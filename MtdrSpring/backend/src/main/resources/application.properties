########################################
# 1. LOGGING 
########################################
logging.level.org.springframework=OFF
logging.level.org.hibernate=OFF
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF

########################################
# 2. JPA / HIBERNATE
########################################
spring.jpa.database-platform=org.hibernate.dialect.Oracle12cDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

########################################
# 3. DATASOURCE – OCI Autonomous DB
########################################
# Ruta al wallet (carpeta donde están tnsnames.ora y los certificados)
# → Usa variable de entorno para que no dependa de la máquina local
# export TNS_ADMIN=/opt/oci-wallet
spring.datasource.url=jdbc:oracle:thin:@javadev_high?TNS_ADMIN=./Wallet_javadev

# Credenciales: NO las hard-codees; léelas de variables
# export DB_USER=TODOUSER
# export DB_PASSWORD=Spring-boot101
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Driver y UCP (puedes mantenerlos si ya te funciona el pooling)
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.type=oracle.ucp.jdbc.PoolDataSource
spring.datasource.oracleucp.connection-factory-class-name=oracle.jdbc.pool.OracleDataSource
spring.datasource.oracleucp.sql-for-validate-connection=select 1 from dual
spring.datasource.oracleucp.connection-pool-name=connectionPoolName1
spring.datasource.oracleucp.initial-pool-size=15
spring.datasource.oracleucp.min-pool-size=10
spring.datasource.oracleucp.max-pool-size=30

########################################
# 4. PUERTO DEL SERVIDOR
########################################
server.port=8081

########################################
# 5. TELEGRAM (mueve esto a variables si es posible)
########################################
telegram.bot.token=${TELEGRAM_TOKEN}
telegram.bot.name=oci_java_bot
