version: 0.1
component: build
timeoutInSeconds: 3600

shell: bash

env:
  variables:
    MTDRWORKSHOP_LOCATION: $(pwd)/MtdrSpring
    OCI_TENANCY: ocid1.tenancy.oc1..aaaaaaaauwncv6iuepfwtyysmdfdkvy2wi7mha4gcigvi75xqntjhqpvvqda
    OCI_REGION: mx-queretaro-1
    OCI_USER_OCID: ocid1.user.oc1..aaaaaaaaztkzhjc6hp7knyg2h4ekwseaxhyzp6bsjp524cjrmnrf3l23lk4a
    COMPARTMENT_OCID: ocid1.compartment.oc1..aaaaaaaaxh5feklm6f3uqj4st22zz6w4p4xnyktq4b33umn342cczr2q6cz
    RUN_NAME: hellodevops
    MTDR_DB_NAME: MTDRDB
    MTDR_KEY: deploy1
    DB_PASSWORD: Springboot-101
    UI_USERNAME: TODOUSER
    UI_PASSWORD: Springboot-101
    DOCKER_REGISTRY: mx-queretaro-1.ocir.io/axvz6pcfltnr/hellodevops/deploy1/todolistapp-springboot
    OKE_OCID: ocid1.cluster.oc1.mx-queretaro-1.aaaaaaaaon7wgecicsiz6dhlqt2kwivorok4276c64fg74kqgcx6i5y2473a
    MTDR_DB_OCID: ocid1.autonomousdatabase.oc1.mx-queretaro-1.anyxeljrlhbismyagbmfvt4tg4nuq6wo6vlaj2vdzm47otpo2vy6x3aql26q
    NAMESPACE: axvz6pcfltnr
    TODO_PDB_NAME: ${TODO_PDB_NAME}

steps:
  - type: Command
    name: "Show environment variables"
    command: |
      echo "==== ENVIRONMENT VARIABLES ===="
      printenv | sort
      echo "==============================="

  - type: Command
    name: "Java Build"
    command: |
      yum install -y dos2unix
      cd MtdrSpring
      dos2unix utils/*.sh
      dos2unix backend/*.sh
      chmod +x utils/*.sh
      source env.sh
      mkdir -p state
      echo "$RUN_NAME" > state/RUN_NAME
      echo "$MTDR_KEY" > state/MTDR_KEY
      echo "$COMPARTMENT_OCID" > state/COMPARTMENT_OCID
      echo "$DOCKER_REGISTRY" > state/DOCKER_REGISTRY
      bash utils/java-builds.sh

  - type: Command
    name: "OKE & DB Setup"
    command: |
      yum install -y dos2unix
      export PATH=/usr/lib/oracle/21/client64/bin:$PATH
      export LD_LIBRARY_PATH=/usr/lib/oracle/21/client64/lib:$LD_LIBRARY_PATH
      cd MtdrSpring
      dos2unix utils/*.sh
      dos2unix backend/*.sh
      chmod +x utils/*.sh
      source env.sh
      mkdir -p state
      touch state/K8S_PROVISIONING
      bash utils/oke-setup.sh

      curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
      chmod +x kubectl
      mv kubectl /usr/local/bin/
      kubectl version --client

      curl -O https://download.oracle.com/otn_software/linux/instantclient/211000/oracle-instantclient-basic-21.1.0.0.0-1.x86_64.rpm
      curl -O https://download.oracle.com/otn_software/linux/instantclient/211000/oracle-instantclient-sqlplus-21.1.0.0.0-1.x86_64.rpm
      yum localinstall -y oracle-instantclient-*.rpm


      oci ce cluster create-kubeconfig --cluster-id "$OKE_OCID" --file $HOME/.kube/config --region "$OCI_REGION" --token-version 2.0.0
      export KUBECONFIG=$HOME/.kube/config
      kubectl config current-context
      kubectl get nodes

      kubectl create namespace mtdrworkshop || echo "Namespace already exists"

      until kubectl get namespace mtdrworkshop; do
        echo "Waiting for mtdrworkshop namespace to be created..."
        sleep 5
      done

      kubectl create secret generic dbuser \
        --from-literal=dbpassword="$DB_PASSWORD" \
        -n mtdrworkshop || echo "dbuser secret already exists"

      echo "$RUN_NAME" > state/RUN_NAME
      echo "$MTDR_KEY" > state/MTDR_KEY
      echo "$MTDR_DB_OCID" > state/MTDR_DB_OCID
      echo "$DB_PASSWORD" > state/DB_PASSWORD
      echo "$COMPARTMENT_OCID" > state/COMPARTMENT_OCID
      echo "$REGION" > state/REGION
      echo "$NAMESPACE" > state/NAMESPACE
      echo "mtdb" > state/MTDR_DB_NAME
      touch state/MTDR_DB_PASSWORD_SET

      bash utils/db-setup.sh

      echo "==== TNS_ADMIN directory ===="
      ls
      ls -l wallet
      echo "==== tnsnames.ora contents ===="
      cat wallet/tnsnames.ora
      echo "==== Using MTDR_DB_SVC: $(cat state/MTDR_DB_NAME)_tp ===="
    
  - type: Command
    name: "Check root directory"
    command: |
        ls -l
        ls -l MtdrSpring
        ls -l MtdrSpring/wallet
        ls -l MtdrSpring/tls

  - type: Command
    name: "Fix permissions"
    command: |
      chmod -R a+r MtdrSpring/wallet
      chmod -R a+r MtdrSpring/tls
      
outputArtifacts:
  - name: tls-crt
    type: BINARY
    location: MtdrSpring/tls/tls.crt
  - name: tls-key
    type: BINARY
    location: MtdrSpring/tls/tls.key
  - name: db-wallet-cwallet
    type: BINARY
    location: MtdrSpring/wallet/cwallet.sso
  - name: db-wallet-ewallet
    type: BINARY
    location: MtdrSpring/wallet/ewallet.p12
  - name: db-wallet-ewallet-pem
    type: BINARY
    location: MtdrSpring/wallet/ewallet.pem
  - name: db-wallet-keystore
    type: BINARY
    location: MtdrSpring/wallet/keystore.jks
  - name: db-wallet-ojdbc
    type: BINARY
    location: MtdrSpring/wallet/ojdbc.properties
  - name: db-wallet-sqlnet
    type: BINARY
    location: MtdrSpring/wallet/sqlnet.ora
  - name: db-wallet-tnsnames
    type: BINARY
    location: MtdrSpring/wallet/tnsnames.ora
  - name: db-wallet-truststore
    type: BINARY
    location: MtdrSpring/wallet/truststore.jks
  - name: db-wallet-zip
    type: BINARY
    location: MtdrSpring/wallet/wallet.zip