version: 0.1
component: build
timeoutInSeconds: 3600

shell: bash

env:
  variables:
    MTDRWORKSHOP_LOCATION: $(pwd)/MtdrSpring
    OCI_TENANCY: ${TENANCY_OCID}
    OCI_REGION: ${REGION_OCI}
    OCI_USER_OCID: ${USER_OCID}
    COMPARTMENT_OCID: ${COMPARTMENT_OCID}
    RUN_NAME: ${RUN_NAME}
    MTDR_DB_NAME: ${MTDR_DB_NAME}
    MTDR_KEY: ${MTDR_KEY}
    DB_PASSWORD: ${DB_PASSWORD}
    UI_USERNAME: ${UI_USERNAME}
    UI_PASSWORD: ${UI_PASSWORD}
    DOCKER_REGISTRY: ${DOCKER_REGISTRY}
    OKE_OCID: ${OKE_OCID}
    MTDR_DB_OCID: ${MTDR_DB_OCID}
    NAMESPACE: ${NAMESPACE}
    TODO_PDB_NAME: ${TODO_PDB_NAME}

steps:
  - type: Command
    name: "Show environment variables"
    command: |
      echo "==== ENVIRONMENT VARIABLES ===="
      printenv | sort
      echo "==============================="

  - type: Command
    name: "List files"
    command: |
      pwd
      ls -l
      ls -l MtdrSpring

  - type: Command
    name: "OKE Setup"
    command: |
      yum install -y dos2unix
      cd MtdrSpring
      dos2unix utils/*.sh
      dos2unix backend/*.sh
      chmod +x utils/*.sh
      source env.sh
      bash utils/oke-setup.sh
    
  - type: Command
    name: "DB Setup"
    command: |
      yum install -y dos2unix
      cd MtdrSpring
      dos2unix utils/*.sh
      dos2unix backend/*.sh
      chmod +x utils/*.sh
      source env.sh
      bash utils/db-setup.sh

  - type: Command
    name: "Java Build"
    command: |
      yum install -y dos2unix
      cd MtdrSpring
      dos2unix utils/*.sh
      dos2unix backend/*.sh
      chmod +x utils/*.sh
      source env.sh
      bash utils/java-builds.sh

  - type: Command
    name: "Deploy Spring Boot App"
    command: |
      yum install -y dos2unix
      cd MtdrSpring
      dos2unix utils/*.sh
      dos2unix backend/*.sh
      chmod +x utils/*.sh
      source env.sh
      bash backend/deploy.sh